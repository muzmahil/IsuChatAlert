[ℹ]
FULLNAME=Isu Chat Alert
DESCRIPTION=A smart radar that pops up on your screen when your name or designated keywords are mentioned in Assetto Corsa chat.

[SETTINGS]
keywords = 
text_size = 32 ; Text Size (Size of the alert text); from 16 to 48
scale = 1.0 ; UI Scale (Overall scale of the window); from 0.5 to 1.5
sound_on = 1 ; Alert Sound (1 = ON, 0 = OFF)
mention_me = 1 ; Mention Alert (Trigger if someone types your name: 1 = ON, 0 = OFF)
color_idx = 0 ; Theme Color (0=Orange, 1=Red, 2=Blue, 3=Green, 4=Purple, 5=White)
opacity = 0.85 ; Background Opacity (Transparency of the background); from 0.2 to 1.0
base_time = 3.0 ; Base Display Time (Seconds it stays on screen); from 1.0 to 10.0
